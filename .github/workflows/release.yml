name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm (requires NPM_TOKEN)
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tag = process.env.RELEASE_TAG || '';
          const normalizedTag = tag.startsWith('v') ? tag.slice(1) : tag;

          if (!tag) {
            throw new Error('Missing release tag from workflow context');
          }

          if (pkg.version !== normalizedTag) {
            throw new Error(
              `Release tag ${tag} does not match package.json version ${pkg.version}`,
            );
          }

          console.log(`Validated release tag ${tag} against package.json version ${pkg.version}`);
          EOF
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
